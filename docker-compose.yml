version: '3.8'
services:
  db:
    image: mysql:5.7
    container_name: nro-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: team2026
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database team2026.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nro-app
    restart: always
    depends_on:
      - db
    ports:
      - "14445:14445"
      - "14449:14449"

volumes:
  db_data:
